<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Autorización Mercado Libre — Radar Ofertas MX</title>
<style>
body{font-family:ui-sans-serif,system-ui,sans-serif;background:#f5f6f8;color:#0d1117;display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0}
.card{background:#fff;border:1px solid #e6e9ee;border-radius:16px;padding:34px;max-width:560px;text-align:center;box-shadow:0 14px 34px rgba(13,17,23,.08)}
h1{font-size:1.2rem;margin:0 0 10px}
code{display:block;background:#0b0f14;color:#7bf1a8;padding:14px;border-radius:10px;font-size:1.05rem;word-break:break-all;margin:14px 0}
button{background:#0b0f14;color:#fff;border:0;border-radius:10px;padding:11px 18px;font-weight:800;cursor:pointer;font-size:.9rem}
p{color:#65707e;font-size:.85rem}
.err{color:#c0392b;font-weight:700}
</style>
</head>
<body>
<div class="card">
<h1>Autorización de Mercado Libre</h1>
<div id="out"></div>
<p>Esta página solo muestra el código que Mercado Libre agrega a la URL; no lo guarda ni lo manda a ningún lado.</p>
</div>
<script>
var p=new URLSearchParams(location.search), code=p.get("code"), err=p.get("error");
var out=document.getElementById("out");
if(code){
  out.innerHTML='<p>Copia este código y pégalo en la ventana del script <b>autorizar_ml_api.bat</b>:</p><code id="c"></code><button onclick="navigator.clipboard.writeText(document.getElementById(\'c\').textContent)">Copiar código</button>';
  document.getElementById("c").textContent=code;
}else if(err){
  out.innerHTML='<p class="err">Mercado Libre regresó un error: '+err+'</p>';
}else{
  out.innerHTML='<p>No llegó ningún código en la URL. Vuelve a correr autorizar_ml_api.bat.</p>';
}
</script>
</body>
</html>
