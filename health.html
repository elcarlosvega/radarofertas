<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Radar Ofertas — Salud interna</title>
<style>
  :root{--bg:#0b0f14;--card:#141b24;--line:#22303d;--ink:#e8eef4;--mut:#93a4b3;
    --ok:#17c964;--deg:#f5a524;--down:#f31260}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:28px 18px}
  .wrap{max-width:820px;margin:0 auto}
  h1{font-size:1.3rem;margin:0 0 4px} .mut{color:var(--mut);font-size:.85rem}
  table{width:100%;border-collapse:collapse;margin-top:18px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{text-align:left;padding:11px 13px;border-bottom:1px solid var(--line);font-size:.9rem}
  th{color:var(--mut);font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:none}
  .pill{display:inline-block;padding:3px 10px;border-radius:99px;font-weight:700;font-size:.78rem}
  .ok{background:rgba(23,201,100,.15);color:var(--ok)}
  .deg{background:rgba(245,165,36,.15);color:var(--deg)}
  .down{background:rgba(243,18,96,.15);color:var(--down)}
  .foot{margin-top:16px;font-size:.8rem;color:var(--mut)}
  code{background:#0d1117;padding:1px 6px;border-radius:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Salud de los monitores</h1>
  <div class="mut" id="upd">Cargando…</div>
  <table>
    <thead><tr><th>Tienda</th><th>Estado</th><th>Último barrido</th><th>Ítems</th><th>Motivo</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="foot">
    Estado calculado por edad del último barrido completo:
    <span class="pill ok">ok</span> &lt;6 h ·
    <span class="pill deg">degradado</span> 6–24 h ·
    <span class="pill down">caído</span> &gt;24 h.
    Se actualiza solo cada 5 min. Página interna, no enlazada. Fuente: <code>/health.json</code>.
  </div>
</div>
<script>
var STORES=['amazon','costco','coppel','ml','palacio','vuelos'];
var OK_H=6, DEG_H=24;
function ago(sec){ if(!sec) return 'nunca'; var h=(Date.now()-sec*1000)/3600000;
  if(h<1) return 'hace '+Math.round(h*60)+' min';
  if(h<48) return 'hace '+h.toFixed(1)+' h';
  return 'hace '+Math.round(h/24)+' d'; }
function statusOf(rec){
  if(!rec) return ['down','sin datos'];
  var last=rec.last_complete_sweep||0, h=last?(Date.now()-last*1000)/3600000:1e9;
  var byAge = h<=OK_H?'ok':(h<=DEG_H?'deg':'down');
  var rep={ok:'ok',degraded:'deg',down:'down'}[rec.status]||'ok';
  var ord={ok:0,deg:1,down:2};
  return [ord[byAge]>=ord[rep]?byAge:rep, ''];
}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function render(doc){
  var stores=(doc&&doc.stores)||{}, rows='';
  var label={ok:'ok',deg:'degradado',down:'caído'};
  STORES.forEach(function(s){
    var rec=stores[s], st=statusOf(rec)[0];
    rows+='<tr><td>'+s+'</td>'+
      '<td><span class="pill '+st+'">'+label[st]+'</span></td>'+
      '<td>'+ago(rec&&rec.last_complete_sweep)+'</td>'+
      '<td>'+((rec&&rec.items!=null)?rec.items:'—')+'</td>'+
      '<td class="mut">'+esc((rec&&rec.reason)||'')+'</td></tr>';
  });
  document.getElementById('rows').innerHTML=rows;
  document.getElementById('upd').textContent='health.json actualizado: '+
    ((doc&&doc.updated_at)?new Date(doc.updated_at*1000).toLocaleString('es-MX'):'desconocido');
}
function load(){
  fetch('/health.json?_='+Date.now(),{cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(render)
    .catch(function(){ document.getElementById('upd').textContent='No hay health.json todavía (aún no publicado por los monitores).'; render({stores:{}}); });
}
load(); setInterval(load, 300000);
</script>
</body>
</html>
